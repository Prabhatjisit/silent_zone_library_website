name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment webhook
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.ref_name }}", "commit": "${{ github.sha }}"}' \
            "https://deploy.aiwazir.com/hermes-deploy-2026"